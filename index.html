<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Why Do You Love Me?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone-frame">

    <!-- Header bar -->
    <div class="header">
      <button class="header-btn back-btn" tabindex="-1" aria-hidden="true">
        <svg class="back-chevron" width="11" height="18" viewBox="0 0 11 18" fill="none">
          <path d="M10 1L1.5 9L10 17" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="back-count">1</span>
      </button>

      <button class="profile-section" tabindex="-1" aria-hidden="true">
        <div class="avatar-wrap">
          <img
            id="profileImg"
            src="assets/profile.jpeg"
            alt="Ben Ansin"
            class="profile-pic"
            onerror="this.onerror=null; this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';"
          >
          <div id="avatarFallback" class="avatar-fallback">BA</div>
        </div>
        <span class="contact-name">Ben Ansin</span>
      </button>

      <button class="header-btn video-btn" tabindex="-1" aria-hidden="true">
        <svg width="26" height="18" viewBox="0 0 26 18" fill="currentColor">
          <path d="M15.5 1.5H2C1.17 1.5.5 2.17.5 3v12c0 .83.67 1.5 1.5 1.5h13.5c.83 0 1.5-.67 1.5-1.5V3c0-.83-.67-1.5-1.5-1.5zm9.5 1.75l-6.5 4.5v3l6.5 4.5V3.25z"/>
        </svg>
      </button>
    </div>

    <!-- Messages scroll area -->
    <div id="messages" class="messages-container" role="log" aria-live="polite" aria-label="Conversation"></div>

    <!-- Input bar -->
    <div class="input-footer">
      <input
        id="messageInput"
        type="text"
        class="message-input"
        value="Why do you love me, Ben?"
        readonly
        aria-label="Message"
        autocomplete="off"
      >
      <button id="sendButton" class="send-button" aria-label="Send">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M7.5 12V3M2.5 7.5L7.5 3L12.5 7.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div><!-- /.phone-frame -->

  <!-- Floating music panel -->
  <div class="music-panel" id="musicPanel">
    <div class="music-top-row">
      <!-- Mute icon (left of toggle) -->
      <svg class="toggle-flanker" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97V10.18l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.22 19l2 2L20.73 19.73 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
      </svg>
      <label class="toggle-switch" aria-label="Enable music">
        <input type="checkbox" id="musicToggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <!-- Music note icon (right of toggle) -->
      <svg class="toggle-flanker" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
    </div>

    <div class="music-details" id="musicDetails">
      <!-- Album art + title -->
      <div class="np-info-row">
        <div class="album-art-wrap">
          <img id="albumArt" class="album-art" src="" alt="" aria-hidden="true">
          <div id="albumArtFallback" class="album-art-fallback">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
            </svg>
          </div>
        </div>
        <span id="nowPlaying" class="now-playing-text">—</span>
      </div>

      <!-- Scrubber -->
      <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" step="0.1" aria-label="Song progress">

      <!-- Volume -->
      <div class="music-vol-row">
        <button id="volDown" class="music-ctrl-btn" aria-label="Volume down">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12A4.5 4.5 0 0 0 16 7.97V16c1.48-.73 2.5-2.25 2.5-4zM5 9v6h4l5 5V4L9 9H5z"/></svg>
        </button>
        <span id="volumeLevel" class="vol-level-text">8%</span>
        <button id="volUp" class="music-ctrl-btn" aria-label="Volume up">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
      </div>

      <!-- Controls -->
      <div class="music-ctrl-row">
        <button id="prevSong" class="music-ctrl-btn" aria-label="Previous song">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button id="playPauseBtn" class="music-ctrl-btn music-ctrl-play" aria-label="Play/Pause">
          <svg id="iconPlay" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="iconPause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button id="nextSong" class="music-ctrl-btn" aria-label="Next song">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zm2.5-8.18L11.53 12 8.5 14.18V9.82zM16 6h2v12h-2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <audio id="audioPlayer" preload="none"></audio>
  <script src="script.js"></script>
</body>
</html>
